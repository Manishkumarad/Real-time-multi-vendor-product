apiVersion: apps/v1
kind: Deployment
metadata:
  name: deodha-app
  labels:
    app: deodha
    component: app
spec:
  replicas: 3
  selector:
    matchLabels:
      app: deodha
      component: app
  template:
    metadata:
      labels:
        app: deodha
        component: app
    spec:
      containers:
      - name: deodha-app
        image: ghcr.io/manishkumarad/dcodha:latest
        ports:
        - containerPort: 5000
        env:
        - name: NODE_ENV
          value: "production"
        - name: DB_HOST
          value: "mysql-service"
        - name: DB_PORT
          value: "3306"
        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: deodha-secrets
              key: db-user
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: deodha-secrets
              key: db-password
        - name: DB_NAME
          value: "deodha_db"
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: deodha-secrets
              key: jwt-secret
        - name: RAZORPAY_KEY_ID
          valueFrom:
            secretKeyRef:
              name: deodha-secrets
              key: razorpay-key-id
        - name: RAZORPAY_KEY_SECRET
          valueFrom:
            secretKeyRef:
              name: deodha-secrets
              key: razorpay-key-secret
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /api/health
            port: 5000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /api/health
            port: 5000
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: deodha-app-service
spec:
  selector:
    app: deodha
    component: app
  ports:
  - protocol: TCP
    port: 80
    targetPort: 5000
  type: ClusterIP
